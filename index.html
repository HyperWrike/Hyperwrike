<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Hyperwrike — AI Automation &amp; Custom Software Agency</title>
    <meta name="description" content="Hyperwrike builds AI automation systems and bespoke software that cut operational costs by 40–70%. Get your free 30-min workflow audit — no commitment." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://hyperwrike.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hyperwrike" />
    <meta property="og:title" content="Hyperwrike — AI Automation &amp; Custom Software Agency" />
    <meta property="og:description" content="We automate your business and build software that scales. Save 40–70% on operational costs within 90 days." />
    <meta property="og:url" content="https://hyperwrike.com/" />
    <meta property="og:image" content="https://hyperwrike.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hyperwrike — AI Automation &amp; Custom Software Agency" />
    <meta name="twitter:description" content="We automate your business and build software that scales. Save 40–70% on operational costs within 90 days." />
    <meta name="twitter:image" content="https://hyperwrike.com/og-image.png" />

    <!-- Google Fonts preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Hyperwrike",
      "url": "https://hyperwrike.com",
      "logo": "https://hyperwrike.com/logo.png",
      "description": "AI Automation and Custom Software Agency helping businesses cut operational costs by 40–70% through intelligent automation.",
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "mounesh@hyperwrike.com",
          "contactType": "customer service",
          "availableLanguage": "English"
        },
        {
          "@type": "ContactPoint",
          "email": "periyanan@hyperwrike.com",
          "contactType": "sales",
          "availableLanguage": "English"
        }
      ],
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Hyperwrike",
      "url": "https://hyperwrike.com"
    }
    </script>

    <!-- JSON-LD: Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "AI Automation & Custom Software",
      "provider": {
        "@type": "Organization",
        "name": "Hyperwrike",
        "url": "https://hyperwrike.com"
      },
      "serviceType": "AI Automation",
      "description": "We design, develop, and implement automation tools and bespoke software that help businesses work smarter, not harder.",
      "areaServed": "Worldwide",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free 30-minute Workflow Audit",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Book a free 30-min call and walk away with a clear automation roadmap."
        }
      ]
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Hyperwrike and how does it work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hyperwrike is an intelligent AI automation agency designed to help you work smarter, not harder. We build custom software and automate repetitive tasks to streamline your entire operation."
          }
        },
        {
          "@type": "Question",
          "name": "How fast can we see results?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most clients see significant operational cost savings within the first 90 days. Automations can often be deployed in as little as 2–4 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private and secure?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. We prioritize security in every build. You own 100% of the code and data we create for you."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need any technical skills to use Hyperwrike?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. We handle all the technical heavy lifting. We build intuitive interfaces that your team can use without any specialized training."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
